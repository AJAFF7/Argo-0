{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blazor-api
  labels:
    app: blazor-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: blazor-api
  template:
    metadata:
      labels:
        app: blazor-api
    spec:
      containers:
      - name: api
        image: {{ .Values.api.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.api.service.port }}
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: {{ .Values.api.env.aspnetcoreEnvironment }}
        - name: ASPNETCORE_URLS
          value: {{ .Values.api.env.aspnetcoreUrls }}
        - name: ConnectionStrings__DefaultConnection
          value: "Host={{ .Values.postgres.service.name }};Port={{ .Values.postgres.service.port }};Database={{ .Values.postgres.env.database }};Username={{ .Values.postgres.env.user }};Password={{ .Values.postgres.env.password }}"
        resources:
          requests:
            memory: {{ .Values.api.resources.requests.memory }}
            cpu: {{ .Values.api.resources.requests.cpu }}
          limits:
            memory: {{ .Values.api.resources.limits.memory }}
            cpu: {{ .Values.api.resources.limits.cpu }}
        {{- if .Values.api.healthCheck.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.api.healthCheck.path }}
            port: {{ .Values.api.service.port }}
          initialDelaySeconds: {{ .Values.api.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.api.healthCheck.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.api.healthCheck.path }}
            port: {{ .Values.api.service.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
        {{- end }}
{{- end }}
